apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: barnacle-e2e

resources:
- namespace.yaml
- redis
- registry
- barnacle

# Image configuration - newName will be set by kustomize edit
# Example: kustomize edit set image barnacle:e2e=192.168.49.2:30500/barnacle:e2e
images:
- name: barnacle
  newName: 192.168.49.2:30500/barnacle
  newTag: e2e
